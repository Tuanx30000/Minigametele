<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Vua Khoáng Sản</title>
  <script>
    // GitHub Pages SPA redirect: chuyển hướng về index.html với path đầy đủ
    var path = window.location.pathname;
    var redirect = window.location.origin + '/index.html' + '?redirect=' + encodeURIComponent(path);
    window.location.replace(redirect);
  </script>
</head>
<body>
  <p>Đang chuyển hướng...</p>
</body>
</html>
